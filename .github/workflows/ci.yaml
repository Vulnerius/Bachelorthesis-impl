---
name: Build and Push Microservices

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]
    paths:
      - 'shop-service/**'
      - 'transaction-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [shop-service, transaction-service]
        include:
          - service: shop-service
            context: ./shop-service
          - service: transaction-service
            context: ./transaction-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_Token }}

      - name: Docker Build and GHCR Push
        uses: docker/build-push-action@v6.19.2
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64, linux/amd64
          push: true
          tags: |
            ghcr.io/vulnerius/${{ matrix.service }}:latest
            ghcr.io/vulnerius/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/vulnerius/${{ matrix.service }}:v1.1
