eni:
  enabled: true
ipam:
  mode: eni
egressMasqueradeInterfaces: "eth+"
routingMode: native
kubeProxyReplacement: true
k8sServiceHost: "TODO:AfterAwsEksDescribeCluster"
k8sServicePort: 443
gatewayAPI:
  enabled: true
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    serviceMonitor:
      enabled: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"