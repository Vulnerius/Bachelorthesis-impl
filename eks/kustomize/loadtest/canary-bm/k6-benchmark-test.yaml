---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-canary-benchmark-test
  namespace: thesis-load-test
spec:
  parallelism: 2
  arguments: -o experimental-prometheus-rw
  script:
    configMap:
      # k6-cm-canary-5m-test || k6-cm-canary-30m-test
      name: k6-cm-canary-5m-script
      file: test.js
  runner:
    nodeSelector:
      role: infra-node
    env:
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://kube-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      - name: K6_PROMETHEUS_RW_TREND_STATS
        value: "p(95),p(99),max,min,avg"
    resources:
      limits:
        cpu: "800m"
        memory: "3Gi"
      requests:
        cpu: "300m"
        memory: "1Gi"