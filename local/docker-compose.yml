services:
  # --- Transaction Service Port 8081---
  transaction-service:
    build:
      context: ../transaction-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ERROR_RATE=0.1
      - LATENCY=1000

  # --- Shop Service Port 8080---
  shop-service:
    build:
      context: ../shop-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PAYMENT_SERVICE_URL=http://transaction-service:8080/pay
      - ERROR_RATE=0.1
      - LATENCY=1000